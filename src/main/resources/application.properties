server.port=8081

spring.application.name=ms-donaciones

# --- MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/donaton_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# --- CORS (Gateway en 8080, frontend en 3000) ---
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8080

# --- Logging ---
logging.level.org.springframework.security=DEBUG
